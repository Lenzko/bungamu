<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunga Pink 3D</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,
    #ffd1e6,
    #ff76aa 45%,
    #ff2f75 100%);
}

/* cahaya */
.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,
    rgba(255,255,255,.5),
    transparent 70%);
    filter:blur(40px);
    animation:pulse 4s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.15);
    }
}

/* bunga */
.flower{
    position:relative;
    width:320px;
    height:320px;
    animation:float 5s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

/* kelopak */
.petal{
    position:absolute;
    width:130px;
    height:180px;

    background:
    radial-gradient(circle at 30% 30%,
    #fff5fa,
    #ffb3d2 30%,
    #ff5c98 70%,
    #ff2f75 100%);

    border-radius:70% 70% 60% 60%;

    left:50%;
    top:50%;

    margin-left:-65px;
    margin-top:-150px;

    transform-origin:center 150px;

    box-shadow:
    inset -8px -12px 20px rgba(255,255,255,.5),
    inset 10px 10px 20px rgba(255,0,90,.35),
    0 0 25px rgba(255,90,150,.7);

    filter:drop-shadow(0 0 15px rgba(255,120,180,.8));

    animation:bloom 2s ease forwards;
    opacity:0;
}

@keyframes bloom{
    from{
        transform:
        rotate(var(--r))
        scale(.1);
        opacity:0;
    }

    to{
        transform:
        rotate(var(--r))
        scale(1);
        opacity:1;
    }
}

/* tengah bunga */
.center{
    position:absolute;
    width:90px;
    height:90px;
    background:
    radial-gradient(circle,
    #fff8c7,
    #ffd54d 50%,
    #ffb300 100%);
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);

    box-shadow:
    0 0 25px rgba(255,220,120,.9),
    inset 0 0 15px rgba(255,255,255,.8);
}

/* batang */
.stem{
    position:absolute;
    width:18px;
    height:280px;
    background:linear-gradient(to bottom,
    #5cff95,
    #168f49);

    bottom:-250px;
    left:50%;
    transform:translateX(-50%);
    border-radius:20px;

    box-shadow:0 0 15px rgba(0,255,100,.4);
}

/* daun */
.leaf{
    position:absolute;
    width:90px;
    height:45px;

    background:linear-gradient(to right,
    #6dff9f,
    #1ea856);

    border-radius:100px 0;

    bottom:80px;
}

.leaf.left{
    left:40px;
    transform:rotate(-35deg);
}

.leaf.right{
    right:40px;
    transform:scaleX(-1) rotate(-35deg);
}

/* partikel */
.spark{
    position:absolute;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px white;
    animation:spark 6s linear infinite;
}

@keyframes spark{
    from{
        transform:translateY(100vh) scale(.2);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh) scale(1);
        opacity:0;
    }
}

/* teks */
.text{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;

    color:white;
    font-size:24px;
    font-weight:bold;

    text-shadow:
    0 0 10px rgba(255,255,255,.8),
    0 0 20px rgba(255,120,180,.8);
}

/* mobile */
@media(max-width:480px){

    .flower{
        transform:scale(.8);
    }

    .text{
        font-size:18px;
        bottom:20px;
    }
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="flower">

    <!-- kelopak -->
    <div class="petal" style="--r:0deg;"></div>
    <div class="petal" style="--r:45deg;"></div>
    <div class="petal" style="--r:90deg;"></div>
    <div class="petal" style="--r:135deg;"></div>
    <div class="petal" style="--r:180deg;"></div>
    <div class="petal" style="--r:225deg;"></div>
    <div class="petal" style="--r:270deg;"></div>
    <div class="petal" style="--r:315deg;"></div>

    <!-- tengah -->
    <div class="center"></div>

    <!-- batang -->
    <div class="stem"></div>

    <!-- daun -->
    <div class="leaf left"></div>
    <div class="leaf right"></div>

</div>

<div class="text">
🌸 Pink Flower Bloom 🌸
</div>

<!-- sparkle -->
<div class="spark" style="left:10%; animation-delay:0s;"></div>
<div class="spark" style="left:25%; animation-delay:2s;"></div>
<div class="spark" style="left:40%; animation-delay:4s;"></div>
<div class="spark" style="left:55%; animation-delay:1s;"></div>
<div class="spark" style="left:70%; animation-delay:5s;"></div>
<div class="spark" style="left:85%; animation-delay:3s;"></div>

</body>
</html>
